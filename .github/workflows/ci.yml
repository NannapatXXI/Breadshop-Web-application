name: CI

# รันทุกครั้งที่ push หรือเปิด Pull Request มายัง branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  #  JOB 1: Build Spring Boot (Backend)
  # ─────────────────────────────────────────
  backend:
    name: Build Backend (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for now)
        working-directory: backend
        run: ./mvnw clean package -DskipTests
        env:
          DB_URL: jdbc:mysql://localhost:3306/dummy
          DB_USERNAME: root
          DB_PASSWORD: dummy
          JWT_SECRET: dummysecretdummysecretdummysecretdummy==
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          MAIL_USERNAME: dummy@dummy.com
          MAIL_PASSWORD: dummy

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────
  #  JOB 2: Build Next.js (Frontend)
  # ─────────────────────────────────────────
  frontend:
    name: Build Frontend (Node 20)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
