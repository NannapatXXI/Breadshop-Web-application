spring.application.name=XXI

# --- MySQL Database Connection ---

spring.datasource.url=jdbc:mysql://localhost:3306/breadProject
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA Settings ---
# [Claude] เปลี่ยนจาก update → validate
# validate = Spring ตรวจว่า entity ตรงกับ DB schema ไหม แต่ไม่แก้ schema เอง
# การแก้ schema ทำผ่าน Flyway migration (V*.sql) เท่านั้น
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Flyway Migration ---
# [Claude] Flyway คือระบบ version control ของ database schema
# ทุกครั้งที่ต้องการ ALTER TABLE หรือสร้างตารางใหม่ ให้สร้างไฟล์ V{n}__*.sql
# แล้ว Flyway จะรันให้อัตโนมัติตอน app start
#
# baseline-on-migrate = true
#   → ถ้ายังไม่มี flyway_schema_history table (database เก่าที่ยังไม่ใช้ Flyway)
#     ให้ mark V1 เป็น baseline (applied แล้ว) และไม่รัน V1 ซ้ำ
#     migration ใหม่จะเริ่มที่ V2 ขึ้นไป
#
# baseline-version = 1
#   → กำหนดว่า baseline คือ version 1 (V1__initial_schema.sql)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT
app.jwtSecret=${JWT_SECRET}
app.jwtExpirationMs=900000
# 


# GOOGLE LOGIN

google.redirectUri=http://localhost:8080/api/v1/auth/google/callback
google.tokenUri=https://oauth2.googleapis.com/token
google.userInfoUri=https://www.googleapis.com/oauth2/v3/userinfo
# เปลี่ยนจากรหัสจริง ให้เป็นตัวแปรแบบนี้
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# เพิ่ม 2 บรรทัดนี้เพื่อให้ Service ของคุณเรียกใช้ได้ง่ายขึ้น
google.clientId=${GOOGLE_CLIENT_ID}
google.clientSecret=${GOOGLE_CLIENT_SECRET}

# --- MAIL (SMTP) CONFIG ---

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- JPA ---
# ปิด open-in-view เพื่อไม่ให้ connection ค้างถึง view layer
spring.jpa.open-in-view=false
# batch fetch ลด N+1 query (โหลด collection lazy ทีละ 20 แทนที่จะเป็น 1 ต่อ row)
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# --- HikariCP Connection Pool ---
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.minimum-idle=5
# เพิ่มจาก 10 → 20 รองรับ concurrent requests มากขึ้น
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1

# Cookie secure flag — false สำหรับ local dev (HTTP), true สำหรับ production (HTTPS)
app.secure-cookie=false
